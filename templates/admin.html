<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1a1a1a;
            padding: 20px;
        }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 18px;
            padding: 8px 12px;
        }
        .tab-btn {
            padding: 8px 16px;
            background: rgba(0,136,204,0.05);
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 40px;
            color: #333;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn i { font-size: 14px; color: #0088cc; }
        .tab-btn.active {
            background: rgba(0, 136, 204, 0.15);
            border-color: #0088cc;
            color: #0088cc;
        }
        .tab-btn:active { transform: scale(0.96); }
        .tab-content {
            display: none;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 20px;
            padding: 20px;
        }
        .tab-content.active { display: block; }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-right: 12px;
            border-right: 3px solid #0088cc;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i { font-size: 18px; color: #0088cc; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 12px; }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: #555;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,136,204,0.3);
            border-radius: 12px;
            color: #1a1a1a;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
        }
        input[type="datetime-local"] {
            direction: ltr;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #0088cc;
        }
        textarea { min-height: 80px; resize: vertical; }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .checkbox-group input {
            width: auto;
            margin: 0;
        }
        .btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn i { color: #fff; }
        .btn-primary {
            background: linear-gradient(135deg, #0088cc, #00aaff);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
        }
        .btn-success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
        }
        .btn:active { transform: scale(0.96); }
        .characters-grid, .channels-grid, .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .character-card, .channel-card, .content-card {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 16px;
            padding: 12px;
        }
        .content-card .content-preview {
            background: rgba(0,136,204,0.05);
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            max-height: 60px;
            overflow-y: auto;
            margin: 6px 0 10px;
            color: #444;
        }
        .content-card .publish-time {
            font-size: 11px;
            color: #0088cc;
            margin: 4px 0;
        }
        .channel-card .channel-id {
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
        }
        .channel-card .admin-id {
            font-size: 11px;
            color: #777;
        }
        .card-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .character-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .character-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0,136,204,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .character-name {
            font-size: 15px;
            font-weight: 700;
        }
        .character-desc {
            font-size: 11px;
            color: #555;
            margin-bottom: 8px;
        }
        .character-prompt {
            background: rgba(0,136,204,0.05);
            padding: 6px;
            border-radius: 10px;
            font-size: 10px;
            color: #444;
            max-height: 60px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .notification-item {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .notification-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .notification-text {
            font-size: 11px;
            color: #555;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #ffffff;
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }
        .time-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .time-input-group input[type="time"] {
            flex: 1;
        }
        .time-input-group .remove-time {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 18px;
        }
        .add-time-btn {
            margin-top: 8px;
        }
        .generate-btn {
            margin-top: 8px;
            width: 100%;
        }
        .spinner-small {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .admin-tabs { gap: 6px; }
            .tab-btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>

</body>
</html>
