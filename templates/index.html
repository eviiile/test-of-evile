<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVILE - الدردشة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-primary: #0b1428;
            --text-primary: #f0f4fa;
            --glass-bg: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.04);
            --accent: #4a8fc4;
            --shadow: rgba(0,0,0,0.3);
            --text-muted: rgba(255,255,255,0.4);
            --card-hover: rgba(255,255,255,0.06);
        }
        [data-theme="light"] {
            --bg-primary: #f0f4fa;
            --text-primary: #0b1428;
            --glass-bg: rgba(255,255,255,0.6);
            --glass-border: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.08);
            --text-muted: rgba(0,0,0,0.4);
            --card-hover: rgba(0,0,0,0.04);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px 12px 80px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width:700px; margin:0 auto; }

        .floating-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            margin-bottom: 16px;
            transition: background 0.3s, border 0.3s;
        }
        .floating-header .logo {
            font-size: 18px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .floating-header .user-badge {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--glass-bg);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }
        .floating-header .user-badge:hover { background: var(--card-hover); border-color: var(--accent); }
        .header-actions { display: flex; gap: 8px; align-items:center; }
        .theme-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 4px 10px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        .theme-toggle:hover { background: var(--card-hover); }

        .chat-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border 0.3s;
        }
        .messages {
            flex: 1;
            max-height: 55vh;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .message { margin-bottom: 10px; }
        .message.own { text-align: left; }
        .message .bubble {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 13px;
            line-height: 1.5;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }
        .message.own .bubble { background: rgba(74,143,196,0.08); border-color: rgba(74,143,196,0.1); }
        .message .time { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

        .input-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border 0.3s;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area button {
            padding: 10px 18px;
            background: linear-gradient(135deg, #0d2847, var(--accent));
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Tajawal', sans-serif;
        }
        .input-area button:active { transform: scale(0.95); }
        .input-area button:disabled { opacity: 0.4; pointer-events: none; }
        .input-area .stop-btn {
            background: rgba(235,87,87,0.2);
            color: #eb5757;
        }

        .toast {
            position: fixed; bottom: 80px; left: 20px; right: 20px;
            background: rgba(11,20,40,0.92);
            backdrop-filter: blur(28px);
            color: #f0f4fa;
            padding: 14px 20px;
            border-radius: 14px;
            text-align: center;
            z-index: 2000;
            display: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.04);
            max-width: 400px;
            margin: 0 auto;
        }
        [data-theme="light"] .toast {
            background: rgba(240,244,250,0.92);
            color: #0b1428;
            border-color: rgba(0,0,0,0.06);
        }

        .bottom-nav {
            position: fixed; bottom: 12px; left: 12px; right: 12px; z-index:1000;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 4px 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 40px var(--shadow);
            height: 44px;
            max-width: 400px;
            margin: 0 auto;
            transition: background 0.3s, border 0.3s;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 8px;
            font-weight: 500;
            transition: all 0.3s;
            padding: 3px 10px;
            border-radius: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            flex: 1;
            max-width: 70px;
        }
        .nav-item i { font-size: 16px; transition: all 0.3s; }
        .nav-item span { font-size: 7px; opacity: 0.6; }
        .nav-item.active { color: var(--accent); background: rgba(74,143,196,0.06); }
        .nav-item.active i { transform: scale(1.05); }
        .nav-item:active { transform: scale(0.95); }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (min-width:768px){ .bottom-nav{left:20px;right:20px} .toast{left:20px;right:20px} }
    </style>
</head>
<body>
    <div class="container">
        <div class="floating-header">
            <span class="logo">EVILE</span>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </button>
                {% if user_code %}
                <span class="user-badge" id="userCodeBadge" title="انقر 3 مرات لنسخ الرقم">
                    <i class="bi bi-person-badge"></i> {{ user_code }}
                </span>
                {% else %}
                <a href="/publish" style="color:var(--text-muted); text-decoration:none; font-size:13px;">تسجيل الدخول</a>
                {% endif %}
            </div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messagesContainer">
                <div class="message"><div class="bubble">مرحباً! أنا مساعد EVILE. كيف يمكنني مساعدتك؟</div><div class="time">الآن</div></div>
            </div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()"><i class="bi bi-send"></i> إرسال</button>
                <button id="stopBtn" class="stop-btn" style="display:none;" onclick="stopResponse()"><i class="bi bi-stop-fill"></i></button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active">
            <i class="bi bi-chat-dots"></i>
            <span>دردشة</span>
        </button>
        <a href="/publish" class="nav-item" style="text-decoration:none;">
            <i class="bi bi-megaphone"></i>
            <span>نشر</span>
        </a>
    </nav>

    <div class="toast" id="toast"></div>

    <script>
        let isProcessing = false, abortController = null;

        // ===== النسخ بثلاث نقرات =====
        let clickCount = 0, clickTimer = null;
        const badge = document.getElementById('userCodeBadge');
        if (badge) {
            badge.addEventListener('click', function() {
                clickCount++;
                if (clickCount === 3) {
                    const code = this.innerText.trim().replace(/[^\w\d]/g, '');
                    navigator.clipboard.writeText(code).then(() => {
                        showToast('تم نسخ الرقم: ' + code);
                    }).catch(() => {
                        const ta = document.createElement('textarea');
                        ta.value = code;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        ta.remove();
                        showToast('تم نسخ الرقم: ' + code);
                    });
                    clickCount = 0;
                    clearTimeout(clickTimer);
                } else {
                    clearTimeout(clickTimer);
                    clickTimer = setTimeout(() => { clickCount = 0; }, 800);
                }
            });
        }

        // ===== الوضع الليلي/النهاري =====
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                icon.className = 'bi bi-sun-fill';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'bi bi-moon-fill';
                localStorage.setItem('theme', 'dark');
            }
        }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeIcon').className = 'bi bi-sun-fill';
        }

        // ===== إرسال رسالة =====
        async function sendMessage() {
            if (isProcessing) return;
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            const container = document.getElementById('messagesContainer');
            addMessage(msg, true);
            input.value = '';
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('stopBtn').style.display = 'inline-flex';

            const loadDiv = document.createElement('div');
            loadDiv.id = 'loadingMsg';
            loadDiv.className = 'message';
            loadDiv.innerHTML = '<div class="bubble"><div class="spinner"></div></div>';
            container.appendChild(loadDiv);
            container.scrollTop = container.scrollHeight;

            abortController = new AbortController();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg }),
                    signal: abortController.signal
                });
                const data = await res.json();
                document.getElementById('loadingMsg').remove();
                if (data.response) {
                    addMessage(data.response, false);
                } else {
                    addMessage('حدث خطأ في المعالجة.', false);
                }
            } catch (err) {
                document.getElementById('loadingMsg').remove();
                if (err.name !== 'AbortError') {
                    addMessage('خطأ في الاتصال بالخادم.', false);
                } else {
                    addMessage('تم إيقاف الرد.', false);
                }
            }
            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('stopBtn').style.display = 'none';
            abortController = null;
        }

        function stopResponse() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('stopBtn').style.display = 'none';
            const load = document.getElementById('loadingMsg');
            if (load) load.remove();
            showToast('تم إيقاف الرد');
        }

        function addMessage(text, isOwn) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="time">${time}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(msg, duration) {
            duration = duration || 3000;
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, duration);
        }
    </script>
</body>
</html>
