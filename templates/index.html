<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            color: #e8e8e8;
            touch-action: manipulation;
        }
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 20% 80%, rgba(132,148,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,240,217,0.05) 0%, transparent 50%),
                        #0a0a0a;
        }
        
        .floating-header {
            position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; border-radius: 16px; gap: 6px;
            max-width: 700px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        @media (min-width: 768px) {
            .floating-header { left: 20px; right: 20px; top: 20px; }
        }
        .header-circle {
            width: 36px; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.25s ease;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
        }
        .header-circle:hover { background: rgba(255,255,255,0.12); }
        .header-circle:active { transform: scale(0.92); }
        .header-circle i { font-size: 18px; }
        .header-circle .notif-badge {
            position: absolute; top: -4px; right: -4px; width: 16px; height: 16px;
            background: #dc3545; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 8px; font-weight: bold; color: #fff;
            border: 2px solid #0a0a0a;
        }
        .logo-wrapper { flex: 1; display: flex; align-items: center; gap: 6px; }
        .logo-center {
            flex: 1; height: 36px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo-text {
            font-size: 18px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, #8494FF, #a8b4ff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .active-users-box {
            height: 36px; padding: 0 12px; border-radius: 12px;
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #aaa;
        }
        .active-users-box i { font-size: 13px; color: #8494FF; }
        .active-users-box span { color: #ccc; }

        .main-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px;
            padding-top: 70px;
            max-width: 700px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .main-container { padding-top: 80px; }
        }

        /* ====== الإعلان (مستطيل في الأسفل - يظهر فقط في الواجهة الرئيسية) ====== */
        .ad-container {
            margin-top: auto;
            padding-top: 12px;
            padding-bottom: 16px; /* رفع مربع الإعلان عن الأرضية قليلاً */
            width: 100%;
            flex-shrink: 0;
            display: none;
        }
        .ad-container.visible { display: block; }
        .ad-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 12px 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 100%;
            max-width: 100%;
        }
        .ad-title {
            font-size: 15px;
            font-weight: 800;
            color: #e8e8e8;
            margin-bottom: 2px;
        }
        .ad-content {
            font-size: 12px;
            color: #bbb;
            line-height: 1.5;
            margin-bottom: 6px;
        }
        .ad-link-btn {
            display: inline-block;
            padding: 3px 14px;
            background: rgba(132, 148, 255, 0.1);
            border: 1px solid rgba(132, 148, 255, 0.12);
            border-radius: 30px;
            color: #8494FF;
            font-weight: 600;
            font-size: 11px;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .ad-link-btn:hover {
            background: rgba(132, 148, 255, 0.18);
            transform: scale(1.02);
        }
        .ad-link-btn:active { transform: scale(0.96); }
        .ad-link-btn i { margin-left: 4px; }

        /* ====== واجهة الترحيب (الأعلى - تم تنزيل العناصر) ====== */
        .welcome-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 0 8px; /* زيادة padding العلوي لتنزيل العناصر */
            text-align: center;
            min-height: 0;
        }
        .welcome-section.active { display: flex; }
        .character-logo-full {
            width: 260px;
            max-width: 75%;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 12px; /* زيادة المسافة */
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .sparkle-icon i { font-size: 44px; color: #8494FF; opacity: 0.5; }
        .welcome-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #8494FF, #a8b4ff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .welcome-subtitle {
            font-size: 11px;
            max-width: 240px;
            color: #999;
            line-height: 1.3;
            margin-bottom: 12px;
        }
        .input-card {
            border-radius: 14px;
            padding: 3px 3px 3px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 4px;
            width: 100%;
            max-width: 290px;
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            outline: none;
            color: #e8e8e8;
        }
        .message-input::placeholder { color: #666; }
        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(132, 148, 255, 0.15);
            color: #8494FF;
            transition: all 0.25s ease;
        }
        .send-btn:hover { background: rgba(132, 148, 255, 0.25); }
        .send-btn:disabled { opacity: 0.5; }
        .send-btn i { font-size: 16px; }
        .send-btn.stop-btn {
            background: rgba(220, 53, 69, 0.15);
            color: #ff6b7a;
        }
        .send-btn.stop-btn:hover { background: rgba(220, 53, 69, 0.25); }
        
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(132,148,255,0.2);
            border-top-color: #8494FF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .char-scroll-container {
            width: 100%;
            max-width: 290px;
            margin: 8px auto 0;
        }
        .char-scroll-wrapper {
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .char-scroll-wrapper:not(.overflowing) { display: flex; justify-content: center; }
        .char-selector { display: flex; gap: 6px; padding: 4px 0; width: max-content; }
        .char-selector-btn {
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #999;
        }
        .char-selector-btn:hover { background: rgba(255,255,255,0.08); }
        .char-selector-btn.active {
            background: rgba(132, 148, 255, 0.12);
            border-color: rgba(132, 148, 255, 0.2);
            color: #8494FF;
        }
        .char-selector-btn i { font-size: 13px; }
        .char-selector-name { font-size: 10px; font-weight: 500; }

        /* ====== شاشة الدردشة (تم تكبير مربع الخلفية 30%) ====== */
        .chat-section {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-section.active { display: flex; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px 20px; /* زيادة padding */
            border-radius: 14px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 8px;
            max-height: 80vh; /* زيادة من 65vh إلى 80vh (~23% زيادة) */
        }
        .message { margin-bottom: 10px; animation: messageSlide 0.3s ease; }
        @keyframes messageSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-time { font-size: 8px; color: #666; margin-bottom: 1px; }
        .message-content {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.5;
            max-width: 85%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #e8e8e8;
        }
        .message.own { text-align: left; }
        .message.own .message-content {
            background: rgba(132,148,255,0.08);
            border-color: rgba(132,148,255,0.15);
        }
        .ai-bubble {
            border-radius: 10px;
            overflow: hidden;
            max-width: 85%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .ai-bubble-label {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px 0;
            font-size: 8px;
            font-weight: 700;
            color: #8494FF;
        }
        .ai-bubble-label i { font-size: 10px; }
        .ai-bubble-text { padding: 4px 10px 8px; font-size: 12px; line-height: 1.5; color: #e0e0e0; }
        .ai-bubble-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px 6px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .ai-social-icons { display: flex; gap: 6px; }
        .ai-social-icons a { text-decoration: none; font-size: 12px; color: #666; transition: transform 0.2s; }
        .ai-social-icons a:active { transform: scale(0.9); }
        .ai-social-icons .bi-telegram { color: #0088cc; }
        .ai-social-icons .bi-instagram { color: #e4405f; }
        .ai-bubble-copy { cursor: pointer; display: flex; align-items: center; gap: 4px; color: #666; font-size: 9px; }
        .ai-bubble-copy i { font-size: 10px; }
        .ai-bubble-copy:active { opacity: 0.6; }

        .input-section {
            flex-shrink: 0;
            padding-bottom: 4px;
        }
        .home-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #888;
            transition: all 0.25s ease;
        }
        .home-btn:hover { background: rgba(255,255,255,0.08); }
        .home-btn:active { transform: scale(0.9); }
        .home-btn i { font-size: 16px; }

        /* ====== Toasts & Sheets ====== */
        .toast-notification {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            color: #e8e8e8;
            padding: 10px 16px;
            border-radius: 12px;
            text-align: center;
            z-index: 200;
            animation: fadeInUp 0.3s ease;
            border: 1px solid rgba(255,255,255,0.04);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 60px;
        }
        .bottom-sheet-overlay.active { display: flex; }
        .bottom-sheet {
            width: 100%;
            max-width: 600px;
            max-height: 70vh;
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.4s ease;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.04);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .sheet-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #e8e8e8; }
        .sheet-title i { color: #8494FF; font-size: 18px; }
        .sheet-close {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: #888;
        }
        .sheet-close:hover { background: rgba(255,255,255,0.06); }
        .sheet-close:active { transform: scale(0.9); }
        .sheet-instruction { font-size: 11px; text-align: center; margin-bottom: 16px; color: #666; }
        .characters-list, .notifications-list { display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; }
        .char-list-item, .notif-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .char-list-item:hover, .notif-item:hover { background: rgba(255,255,255,0.06); }
        .char-list-item.active { border-color: rgba(132,148,255,0.15); background: rgba(132,148,255,0.04); }
        .char-list-icon, .notif-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #8494FF;
            background: rgba(132,148,255,0.06);
        }
        .char-list-info, .notif-content { flex: 1; text-align: right; }
        .char-list-name, .notif-title { font-size: 13px; font-weight: 700; color: #e8e8e8; }
        .char-list-desc, .notif-text { font-size: 10px; color: #888; line-height: 1.3; }
        .char-list-check {
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #8494FF; color: #fff; font-size: 12px;
            opacity: 0; transition: opacity 0.2s;
        }
        .char-list-item.active .char-list-check { opacity: 1; }
        
        .toast {
            position: fixed;
            bottom: 70px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            color: #e8e8e8;
            padding: 10px 16px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            display: none;
            font-size: 13px;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.04);
        }

        @media (max-width: 480px) {
            .character-logo-full { width: 180px; }
            .ad-card { padding: 10px 12px; }
            .ad-title { font-size: 14px; }
            .welcome-title { font-size: 18px; }
            .messages-container { max-height: 70vh; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header class="floating-header">
        <div style="display: flex; gap: 4px;">
            <div class="header-circle" onclick="openCharactersSheet()">
                <i class="bi bi-people"></i>
            </div>
        </div>
        <div class="logo-wrapper">
            <div class="logo-center"><span class="logo-text">EVILE</span></div>
            <div class="active-users-box">
                <i class="bi bi-person-friends"></i>
                <span id="activeCount">0</span>
            </div>
        </div>
        <div class="header-circle" onclick="openNotificationsSheet()" style="position:relative;">
            <i class="bi bi-bell"></i>
            <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
        </div>
    </header>

    <div class="main-container">
        <!-- ====== واجهة الترحيب (الأعلى - تم تنزيل العناصر) ====== -->
        <div class="welcome-section" id="welcomeSection">
            <div id="welcomeLogo">
                <div class="sparkle-icon"><i class="bi bi-stars"></i></div>
            </div>
            <h1 class="welcome-title" id="welcomeTitle">ابنِ أفكارك مع EVILE</h1>
            <p class="welcome-subtitle" id="welcomeSubtitle">اختر شخصية وابدأ محادثة إبداعية</p>
            
            <div class="welcome-input-card" style="width:100%; max-width:290px;">
                <div class="input-card">
                    <input type="text" class="message-input" id="welcomeInput" placeholder="اكتب رسالتك..." onkeypress="handleWelcomeKey(event)">
                    <div class="input-actions">
                        <button class="send-btn" id="welcomeSendBtn" onclick="sendWelcomeMessage()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="char-scroll-container">
                <div class="char-scroll-wrapper" id="charScrollWrapper">
                    <div class="char-selector" id="charSelector"></div>
                </div>
            </div>
        </div>

        <!-- ====== شاشة الدردشة (مربع الخلفية مكبر 30%) ====== -->
        <div class="chat-section" id="chatSection">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-section">
                <div class="input-card">
                    <button class="home-btn" onclick="goHome()" title="الرئيسية">
                        <i class="bi bi-house-door"></i>
                    </button>
                    <input type="text" class="message-input" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="handleChatKey(event)">
                    <div class="input-actions">
                        <button class="send-btn" id="sendBtn" onclick="sendChatMessage()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ====== الإعلان (مستطيل في الأسفل - تم رفعه قليلاً عن الأرضية) ====== -->
        <div class="ad-container visible" id="adContainer">
            {% if active_ads %}
                {% for ad in active_ads %}
                <div class="ad-card">
                    <div class="ad-title">{{ ad.title }}</div>
                    <div class="ad-content">{{ ad.content }}</div>
                    {% if ad.link %}
                    <a href="{{ ad.link }}" target="_blank" class="ad-link-btn">
                        <i class="bi bi-box-arrow-up-right"></i> رابط
                    </a>
                    {% endif %}
                </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <!-- ====== الأوراق السفلية ====== -->
    <div class="bottom-sheet-overlay" id="charactersSheet" onclick="closeSheetOnBackdrop(event, 'charactersSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-header">
                <div class="sheet-title"><i class="bi bi-people"></i> الشخصيات</div>
                <button class="sheet-close" onclick="closeSheet('charactersSheet')"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="sheet-instruction">اختر الشخصية المناسبة لمحادثتك</div>
            <div id="charactersList" class="characters-list"></div>
        </div>
    </div>

    <div class="bottom-sheet-overlay" id="notificationsSheet" onclick="closeSheetOnBackdrop(event, 'notificationsSheet')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-header">
                <div class="sheet-title"><i class="bi bi-bell"></i> الإشعارات</div>
                <button class="sheet-close" onclick="closeSheet('notificationsSheet')"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="notificationsList" class="notifications-list"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ====== بيانات من Flask ======
        let characters = [];
        try { characters = {{ characters|tojson }}; } catch(e) { characters = []; }
        if (!characters || characters.length === 0) {
            characters = [{
                id: 0,
                name: 'EVILE',
                description: 'مساعد ذكي لتوليد الأفكار',
                callback_key: 'evile_default',
                prompt: 'أنت مساعد ذكي ومبدع.',
                logo_url: ''
            }];
        }
        let currentCharacter = characters[0]?.callback_key || 'evile_default';
        let isFirstMessage = true;
        let isProcessing = false;
        let abortController = null;

        // ====== عناصر DOM ======
        const welcomeSection = document.getElementById('welcomeSection');
        const chatSection = document.getElementById('chatSection');
        const adContainer = document.getElementById('adContainer');
        const charScrollWrapper = document.getElementById('charScrollWrapper');
        const messagesContainer = document.getElementById('messagesContainer');
        const welcomeInput = document.getElementById('welcomeInput');
        const chatInput = document.getElementById('chatInput');

        // ====== حفظ واسترجاع الدردشات ======
        function getChatHistory(characterKey) {
            try {
                const data = localStorage.getItem('chat_history_' + characterKey);
                return data ? JSON.parse(data) : [];
            } catch(e) { return []; }
        }

        function saveChatHistory(characterKey, messages) {
            try {
                localStorage.setItem('chat_history_' + characterKey, JSON.stringify(messages));
            } catch(e) {}
        }

        function loadChatHistory(characterKey) {
            const history = getChatHistory(characterKey);
            messagesContainer.innerHTML = '';
            history.forEach(msg => {
                addMessage(msg.text, msg.isOwn, false);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ====== دوال الدردشة ======
        window.goHome = function() {
            if (abortController) {
                abortController.abort();
                abortController = null;
                isProcessing = false;
                resetSendButtons();
            }
            chatSection.classList.remove('active');
            welcomeSection.classList.add('active');
            adContainer.classList.add('visible');
            isFirstMessage = true;
        };

        function initScreen() {
            welcomeSection.classList.add('active');
            chatSection.classList.remove('active');
            adContainer.classList.add('visible');
            updateActiveUsers();
            renderCharSelector();
            renderCharactersSheet();
            updateWelcomeDisplay();
            if (characters.length > 0) {
                loadChatHistory(characters[0].callback_key);
            }
        }

        function updateActiveUsers() {
            fetch('/api/active_users')
                .then(r => r.json())
                .then(d => { document.getElementById('activeCount').textContent = d.count || 0; })
                .catch(() => {});
        }

        function renderCharSelector() {
            const selector = document.getElementById('charSelector');
            if (!characters || characters.length === 0) {
                selector.innerHTML = '<div class="char-selector-btn" style="cursor:default;">لا توجد شخصيات</div>';
                return;
            }
            selector.innerHTML = characters.map(c => `
                <div class="char-selector-btn ${c.callback_key === currentCharacter ? 'active' : ''}" data-key="${c.callback_key}">
                    <i class="bi bi-robot"></i>
                    <span class="char-selector-name">${escapeHtml(c.name)}</span>
                </div>
            `).join('');
            if (charScrollWrapper) {
                const overflow = selector.scrollWidth > charScrollWrapper.clientWidth;
                charScrollWrapper.classList.toggle('overflowing', overflow);
                if (!overflow) {
                    charScrollWrapper.style.display = 'flex';
                    charScrollWrapper.style.justifyContent = 'center';
                }
            }
            document.querySelectorAll('.char-selector-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.dataset.key;
                    if (key) selectCharacter(key);
                });
            });
        }

        function renderCharactersSheet() {
            const list = document.getElementById('charactersList');
            if (!characters || characters.length === 0) {
                list.innerHTML = '<div class="char-list-item" style="justify-content:center; color:#666;">لا توجد شخصيات بعد</div>';
                return;
            }
            list.innerHTML = characters.map(c => `
                <div class="char-list-item ${c.callback_key === currentCharacter ? 'active' : ''}" onclick="selectCharacter('${c.callback_key}')">
                    <div class="char-list-icon"><i class="bi bi-robot"></i></div>
                    <div class="char-list-info">
                        <div class="char-list-name">${escapeHtml(c.name)}</div>
                        <div class="char-list-desc">${escapeHtml(c.description)}</div>
                    </div>
                    <div class="char-list-check"><i class="bi bi-check-lg"></i></div>
                </div>
            `).join('');
        }

        async function renderNotificationsSheet() {
            try {
                const res = await fetch('/api/notifications');
                const notifications = await res.json();
                const list = document.getElementById('notificationsList');
                const badge = document.getElementById('notifBadge');
                if (!notifications || notifications.length === 0) {
                    list.innerHTML = '<div class="notif-item" style="justify-content:center; color:#666;">لا توجد إشعارات</div>';
                    badge.style.display = 'none';
                    return;
                }
                badge.textContent = notifications.length;
                badge.style.display = 'flex';
                list.innerHTML = notifications.map(n => `
                    <div class="notif-item">
                        <div class="notif-icon"><i class="bi bi-bell"></i></div>
                        <div class="notif-content">
                            <div class="notif-title">${escapeHtml(n.title)}</div>
                            <div class="notif-text">${escapeHtml(n.text)}</div>
                            <div style="font-size:10px; color:#666;">${escapeHtml(n.created_at)}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        function updateWelcomeDisplay() {
            const char = characters.find(c => c.callback_key === currentCharacter);
            const logo = document.getElementById('welcomeLogo');
            const title = document.getElementById('welcomeTitle');
            const sub = document.getElementById('welcomeSubtitle');
            if (char) {
                if (char.logo_url) {
                    logo.innerHTML = `<img src="${escapeHtml(char.logo_url)}" class="character-logo-full" alt="${escapeHtml(char.name)}">`;
                } else {
                    logo.innerHTML = `<div class="sparkle-icon"><i class="bi bi-robot"></i></div>`;
                }
                title.textContent = char.name;
                sub.textContent = char.description;
            } else {
                logo.innerHTML = `<div class="sparkle-icon"><i class="bi bi-stars"></i></div>`;
                title.textContent = 'ابنِ أفكارك مع EVILE';
                sub.textContent = 'اختر شخصية وابدأ محادثة إبداعية';
            }
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m); }

        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, duration);
        }

        function setButtonLoading(btn, loading) {
            if (!btn) return;
            btn.disabled = loading;
            if (loading) {
                btn.innerHTML = '<div class="spinner"></div>';
                btn.classList.remove('stop-btn');
            } else {
                btn.innerHTML = '<i class="bi bi-send"></i>';
                btn.classList.remove('stop-btn');
            }
        }

        function setStopButton(btn) {
            if (!btn) return;
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-stop-circle"></i>';
            btn.classList.add('stop-btn');
        }

        function resetSendButtons() {
            const btns = document.querySelectorAll('.send-btn');
            btns.forEach(btn => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send"></i>';
                btn.classList.remove('stop-btn');
            });
        }

        function addMessage(text, isOwn, save = true) {
            const container = document.getElementById('messagesContainer');
            const time = new Date().toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' });
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.innerHTML = `<div class="message-time">${time}</div><div class="message-content">${escapeHtml(text)}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            if (save) {
                const history = getChatHistory(currentCharacter);
                history.push({ text, isOwn, time });
                saveChatHistory(currentCharacter, history);
            }
        }

        function showLoading() {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.id = 'loadingMessage';
            div.className = 'message';
            div.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        function removeLoading() { const el = document.getElementById('loadingMessage'); if (el) el.remove(); }

        async function streamResponse(text) {
            return new Promise((resolve) => {
                const container = document.getElementById('messagesContainer');
                const time = new Date().toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `<div class="message-time">${time}</div>`;
                container.appendChild(msgDiv);
                const bubble = document.createElement('div');
                bubble.className = 'ai-bubble';
                bubble.innerHTML = `
                    <div class="ai-bubble-label"><i class="bi bi-cpu"></i> AI</div>
                    <div class="ai-bubble-text"></div>
                    <div class="ai-bubble-footer">
                        <div class="ai-social-icons">
                            <a href="https://t.me/Evile_Prompts" target="_blank" class="bi bi-telegram"></a>
                            <a href="https://www.instagram.com/bla6c7" target="_blank" class="bi bi-instagram"></a>
                        </div>
                        <div class="ai-bubble-copy"><i class="bi bi-files"></i> <span>نسخ</span></div>
                    </div>
                `;
                msgDiv.appendChild(bubble);
                const textEl = bubble.querySelector('.ai-bubble-text');
                const copyBtn = bubble.querySelector('.ai-bubble-copy');
                const fullText = text;
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(fullText).then(() => {
                        copyBtn.innerHTML = '<i class="bi bi-check-lg"></i> <span>تم</span>';
                        setTimeout(() => { copyBtn.innerHTML = '<i class="bi bi-files"></i> <span>نسخ</span>'; }, 1500);
                    });
                };
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                textEl.appendChild(cursor);
                let idx = 0;
                const interval = setInterval(() => {
                    if (idx < text.length) {
                        const span = document.createElement('span');
                        span.textContent = text.charAt(idx);
                        textEl.insertBefore(span, cursor);
                        idx++;
                        container.scrollTop = container.scrollHeight;
                    } else {
                        clearInterval(interval);
                        cursor.remove();
                        const history = getChatHistory(currentCharacter);
                        history.push({ text: fullText, isOwn: false, time: time });
                        saveChatHistory(currentCharacter, history);
                        resolve();
                    }
                }, 20);
            });
        }

        function cancelRequest() {
            if (abortController) {
                abortController.abort();
                abortController = null;
                isProcessing = false;
                resetSendButtons();
                removeLoading();
                showToast('⛔ تم إلغاء الرد', 2000);
            }
        }

        async function actuallySendMessage(message) {
            if (isProcessing) return;
            if (!message.trim()) return;
            
            abortController = new AbortController();
            isProcessing = true;
            const sendBtn = document.getElementById('sendBtn') || document.getElementById('welcomeSendBtn');
            setStopButton(sendBtn);
            
            addMessage(message, true);
            welcomeInput.value = '';
            chatInput.value = '';
            
            showLoading();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character: currentCharacter, message }),
                    signal: abortController.signal
                });
                const data = await res.json();
                removeLoading();
                if (data.response) {
                    await streamResponse(data.response);
                } else {
                    addMessage('حدث خطأ. حاول مرة أخرى.', false);
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    // تم الإلغاء بواسطة المستخدم
                } else {
                    removeLoading();
                    addMessage('خطأ في الاتصال.', false);
                }
            }
            isProcessing = false;
            abortController = null;
            resetSendButtons();
        }

        async function sendWelcomeMessage() {
            if (isProcessing) {
                cancelRequest();
                return;
            }
            const msg = welcomeInput.value.trim();
            if (!msg) return;
            if (isFirstMessage) {
                welcomeSection.classList.remove('active');
                chatSection.classList.add('active');
                adContainer.classList.remove('visible');
                isFirstMessage = false;
            }
            await actuallySendMessage(msg);
        }

        async function sendChatMessage() {
            if (isProcessing) {
                cancelRequest();
                return;
            }
            const msg = chatInput.value.trim();
            if (!msg) return;
            await actuallySendMessage(msg);
        }

        function handleWelcomeKey(e) { 
            if (e.key === 'Enter' && !isProcessing) {
                sendWelcomeMessage();
            }
        }
        function handleChatKey(e) { 
            if (e.key === 'Enter' && !isProcessing) {
                sendChatMessage();
            }
        }

        function openCharactersSheet() { renderCharactersSheet(); document.getElementById('charactersSheet').classList.add('active'); }
        async function openNotificationsSheet() { await renderNotificationsSheet(); document.getElementById('notificationsSheet').classList.add('active'); document.getElementById('notifBadge').style.display = 'none'; }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); }
        function closeSheetOnBackdrop(e, id) { if (e.target === e.currentTarget) closeSheet(id); }
        
        function selectCharacter(key) {
            if (abortController) {
                abortController.abort();
                abortController = null;
                isProcessing = false;
                resetSendButtons();
                removeLoading();
            }
            currentCharacter = key;
            renderCharSelector();
            renderCharactersSheet();
            updateWelcomeDisplay();
            closeSheet('charactersSheet');
            const char = characters.find(c => c.callback_key === key);
            if (char) {
                welcomeInput.placeholder = `اكتب لـ ${char.name}...`;
                chatInput.placeholder = `اكتب لـ ${char.name}...`;
            }
            loadChatHistory(key);
            if (!isFirstMessage) {
                welcomeSection.classList.remove('active');
                chatSection.classList.add('active');
                adContainer.classList.remove('visible');
            }
        }

        // ====== التهيئة ======
        document.addEventListener('DOMContentLoaded', function() {
            initScreen();
            setInterval(updateActiveUsers, 30000);
        });
    </script>
</body>
</html>
