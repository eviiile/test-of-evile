<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
            touch-action: manipulation;
            background: #ffffff;
            color: #1a1a1a;
        }
        body.light {
            background: #ffffff;
            color: #1a1a1a;
        }
        body.light .bg-animation {
            background: radial-gradient(circle at 20% 80%, rgba(0,136,204,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0,136,204,0.03) 0%, transparent 50%);
        }
        body.light .floating-header,
        body.light .input-card,
        body.light .bottom-sheet,
        body.light .char-selector-btn,
        body.light .char-list-item,
        body.light .notif-item,
        body.light .message-content,
        body.light .ai-bubble,
        body.light .splash-input-wrapper,
        body.light .login-card {
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            color: #1a1a1a;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.05);
        }
        body.light .header-circle,
        body.light .home-btn,
        body.light .send-btn {
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
        }
        body.light .header-circle i,
        body.light .home-btn i,
        body.light .send-btn i,
        body.light .active-users-box i,
        body.light .active-users-box span {
            color: #333;
        }
        body.light .welcome-title,
        body.light .logo-text {
            background: linear-gradient(135deg, #0088cc, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sky-blue-btn {
            background: linear-gradient(135deg, #0088cc, #00aaff) !important;
            color: #fff !important;
            border: none !important;
        }
        .sky-blue-btn i { color: #fff !important; }
        .sky-blue-text { color: #0088cc; }
        
        body.dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        body.dark .bg-animation {
            background: radial-gradient(circle at 20% 80%, rgba(0,136,204,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0,136,204,0.08) 0%, transparent 50%);
        }
        body.dark .floating-header,
        body.dark .input-card,
        body.dark .bottom-sheet,
        body.dark .char-selector-btn,
        body.dark .char-list-item,
        body.dark .notif-item,
        body.dark .message-content,
        body.dark .ai-bubble,
        body.dark .splash-input-wrapper,
        body.dark .login-card {
            background: rgba(0, 136, 204, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            color: #e0e0e0;
        }
        body.dark .header-circle,
        body.dark .home-btn,
        body.dark .send-btn {
            background: rgba(0, 136, 204, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
        }
        body.dark .header-circle i,
        body.dark .home-btn i,
        body.dark .send-btn i,
        body.dark .active-users-box i,
        body.dark .active-users-box span {
            color: #ccc;
        }
        body.dark .welcome-title,
        body.dark .logo-text {
            background: linear-gradient(135deg, #0088cc, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .bg-animation {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            filter: blur(80px);
            transition: background 0.3s;
        }
        .main-container { width: 100%; height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: 12px; padding-top: 70px; }
        
        .floating-header {
            position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
            display: flex; align-items: center; justify-content: space-between; padding: 6px;
            border-radius: 18px; gap: 6px;
            transition: all 0.3s;
        }
        .header-circle {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; flex-shrink: 0; position: relative;
        }
        .header-circle:active { transform: scale(0.9); }
        .header-circle i { font-size: 20px; }
        .header-circle .notif-badge {
            position: absolute; top: -3px; right: -3px; width: 16px; height: 16px; background: #dc3545;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; color: #fff; border: 2px solid currentColor;
        }
        .logo-wrapper { flex: 1; display: flex; align-items: center; gap: 6px; }
        .logo-center {
            flex: 1; height: 40px; background: transparent;
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text {
            font-size: 20px; font-weight: 900;
            letter-spacing: 3px;
        }
        .active-users-box {
            height: 40px; padding: 0 10px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            font-size: 11px; font-weight: 700; white-space: nowrap;
        }
        .active-users-box i { font-size: 14px; }

        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.05);
            height: 44px;
            max-width: 400px;
            margin: 0 auto;
            transition: opacity 0.3s, transform 0.3s;
        }
        .bottom-nav.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        body.dark .bottom-nav {
            background: rgba(0, 136, 204, 0.12);
            backdrop-filter: blur(12px);
            border-color: rgba(0, 136, 204, 0.2);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            text-decoration: none;
            color: #999;
            font-size: 8px;
            font-weight: 500;
            transition: all 0.2s;
            padding: 3px 10px;
            border-radius: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            flex: 1;
            max-width: 70px;
        }
        .nav-item i { font-size: 16px; transition: all 0.2s; }
        .nav-item span { font-size: 7px; }
        .nav-item.active {
            color: #0088cc;
            background: rgba(0, 136, 204, 0.15);
        }
        .nav-item.active i { transform: scale(1.05); }
        .nav-item:active { transform: scale(0.95); }

        .splash-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
        }
        .splash-section.active { display: flex; }
        .splash-icon {
            width: 100px;
            height: 100px;
            background: rgba(0,136,204,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } }
        .splash-icon i { font-size: 56px; color: #0088cc; }
        .splash-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .splash-text {
            font-size: 16px;
            max-width: 280px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .splash-input-wrapper {
            width: 100%;
            max-width: 320px;
            display: flex;
            gap: 12px;
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 6px 6px 6px 16px;
            align-items: center;
        }
        .splash-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            color: #1a1a1a;
        }
        .splash-input::placeholder { font-size: 14px; }
        .splash-btn {
            width: 48px;
            height: 48px;
            border-radius: 40px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .splash-btn:active { transform: scale(0.94); }
        .splash-btn i { font-size: 24px; color: #fff; }
        .splash-error {
            margin-top: 16px;
            font-size: 12px;
            color: #dc3545;
            background: rgba(220,53,69,0.1);
            border-radius: 40px;
            padding: 8px 16px;
        }

        .welcome-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            overflow-y: auto;
        }
        .welcome-section.active { display: flex; }
        .character-logo {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid rgba(0,136,204,0.2);
            background: rgba(255,255,255,0.9);
        }
        .sparkle-icon { width: 60px; height: 60px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .sparkle-icon i { font-size: 60px; color: #0088cc; }
        .welcome-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .welcome-subtitle {
            font-size: 12px;
            max-width: 260px;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        .welcome-input-card {
            width: 100%;
            max-width: 320px;
            margin-bottom: 8px;
        }
        .input-card {
            border-radius: 18px;
            padding: 6px 6px 6px 12px;
            transition: all 0.3s;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            outline: none;
            color: #1a1a1a;
        }
        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.5; }
        .send-btn:active:not(:disabled) { transform: scale(0.94); }
        .send-btn i { font-size: 18px; }
        .send-btn.sky-blue {
            background: linear-gradient(135deg, #0088cc, #00aaff) !important;
            color: #fff !important;
        }
        .send-btn.sky-blue i { color: #fff; }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #0088cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .char-scroll-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 8px auto 12px;
        }
        .char-scroll-wrapper {
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .char-scroll-wrapper:not(.overflowing) {
            display: flex;
            justify-content: center;
        }
        .char-selector {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            width: max-content;
        }
        .char-selector-btn {
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            backdrop-filter: blur(12px);
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-size: 11px;
        }
        .char-selector-btn.active {
            background: rgba(0, 136, 204, 0.2);
            border-color: #0088cc;
        }
        .char-selector-btn i { font-size: 14px; color: #0088cc; }
        .char-selector-name { font-size: 11px; font-weight: 500; }

        .chat-section {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-section.active { display: flex; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 20px;
        }
        .message { margin-bottom: 10px; animation: messageSlide 0.3s ease; }
        @keyframes messageSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-time { font-size: 9px; margin-bottom: 3px; color: #888; }
        .message-content {
            border: 1px solid rgba(0,136,204,0.2);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            max-width: 85%;
            background: rgba(255,255,255,0.9);
        }
        .message.own { text-align: left; }
        .message.own .message-content {
            margin-right: auto;
            margin-left: 0;
        }
        .ai-bubble {
            border: 1px solid rgba(0,136,204,0.2);
            border-radius: 12px;
            overflow: hidden;
            max-width: 85%;
            background: rgba(255,255,255,0.9);
        }
        .ai-bubble-label {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px 0;
            font-size: 9px;
            font-weight: 700;
            color: #0088cc;
        }
        .ai-bubble-label i { font-size: 11px; }
        .ai-bubble-text { padding: 4px 10px 8px; font-size: 12px; line-height: 1.5; word-wrap: break-word; }
        .ai-bubble-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px 6px;
            border-top: 1px solid rgba(0,136,204,0.1);
        }
        .ai-social-icons { display: flex; gap: 8px; }
        .ai-social-icons a {
            text-decoration: none;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .ai-social-icons a:active { transform: scale(0.9); }
        .ai-social-icons .bi-telegram { color: #0088cc; }
        .ai-social-icons .bi-instagram { color: #e4405f; }
        .ai-bubble-copy {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ai-bubble-copy i { font-size: 12px; }
        .ai-bubble-copy span { font-size: 10px; }
        .ai-bubble-copy:active { opacity: 0.6; }

        .input-section { padding: 6px 0; flex-shrink: 0; }
        .chat-section .input-card { padding: 8px 10px; }
        .home-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .home-btn:active { transform: scale(0.9); }
        .home-btn i { font-size: 18px; }

        .toast-notification {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            z-index: 200;
            animation: fadeInUp 0.3s ease;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-sheet-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 70px;
        }
        .bottom-sheet-overlay.active { display: flex; }
        .bottom-sheet {
            width: 100%;
            max-width: 600px;
            max-height: 70vh;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.4s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 136, 204, 0.2);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,136,204,0.1);
        }
        .sheet-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .sheet-title i { font-size: 18px; color: #0088cc; }
        .sheet-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .sheet-close i { font-size: 16px; }
        .sheet-instruction {
            font-size: 11px;
            text-align: center;
            margin-bottom: 16px;
            padding: 6px;
            border-radius: 30px;
            background: rgba(0,136,204,0.05);
        }
        .characters-list, .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            max-height: 50vh;
        }
        .char-list-item, .notif-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 16px;
            width: 100%;
        }
        .char-list-icon, .notif-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .char-list-icon i, .notif-icon i { font-size: 20px; color: #0088cc; }
        .char-list-info, .notif-content {
            flex: 1;
            text-align: right;
        }
        .char-list-name, .notif-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .char-list-desc, .notif-text {
            font-size: 10px;
            line-height: 1.3;
        }
        .char-list-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }
        .char-list-item.active .char-list-check {
            opacity: 1;
        }
        .char-list-check i { font-size: 12px; color: #0088cc; }

        @media (min-width: 768px) {
            .main-container { max-width: 700px; margin: 0 auto; padding: 20px; padding-top: 80px; }
            .floating-header { left: 20px; right: 20px; top: 20px; }
            .bottom-nav { left: 20px; right: 20px; }
        }
    </style>
</head>
<body class="light">
    <!-- نفس المحتوى -->
    ...
</body>
</html>
