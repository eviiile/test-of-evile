<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - EVILE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8f9fa;
            background: radial-gradient(circle at 20% 30%, rgba(0,136,204,0.03) 0%, #f8f9fa 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(0,136,204,0.06) 0%, transparent 60%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(0, 136, 204, 0.12);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(0, 136, 204, 0.25);
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }
        .login-card:hover { transform: translateY(-5px); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon i { font-size: 36px; color: #fff; }
        h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #666; font-size: 14px; text-align: center; }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; font-size: 14px; }
        input {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(0,136,204,0.3);
            border-radius: 16px;
            color: #1a1a1a;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #0088cc;
            background: rgba(255,255,255,0.98);
            box-shadow: 0 0 0 3px rgba(0,136,204,0.1);
        }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0,136,204,0.3);
        }
        .btn:hover { transform: translateY(-2px); }
        .flash {
            padding: 12px;
            background: rgba(220,53,69,0.1);
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 14px;
            color: #dc3545;
            margin-bottom: 24px;
            text-align: center;
            font-size: 14px;
        }
        @media (max-width: 480px) { .login-card { padding: 32px 24px; } h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <!-- نفس المحتوى -->

</body>
</html>
