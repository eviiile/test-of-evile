<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - EVILE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-primary: #0b1428;
            --text-primary: #f0f4fa;
            --glass-bg: rgba(255,255,255,0.02);
            --glass-border: rgba(255,255,255,0.04);
            --accent: #4a8fc4;
            --shadow: rgba(0,0,0,0.3);
            --text-muted: rgba(255,255,255,0.3);
        }
        [data-theme="light"] {
            --bg-primary: #f0f4fa;
            --text-primary: #0b1428;
            --glass-bg: rgba(255,255,255,0.6);
            --glass-border: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.08);
            --text-muted: rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px var(--shadow);
            transition: background 0.3s, border 0.3s;
        }
        .login-card .logo { text-align:center; margin-bottom:32px; }
        .login-card .logo i { font-size:48px; color:var(--accent); }
        .login-card h1 {
            font-size:28px; font-weight:800;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color:transparent;
            margin-bottom:8px;
        }
        .login-card .subtitle { color:var(--text-muted); font-size:14px; text-align:center; }
        .form-group { margin-bottom:24px; }
        label { display:block; margin-bottom:8px; color:var(--text-muted); font-weight:500; font-size:14px; }
        input {
            width:100%; padding:14px 18px;
            background:var(--glass-bg);
            border:1px solid var(--glass-border);
            border-radius:16px;
            color:var(--text-primary);
            font-size:16px;
            font-family:'Tajawal', sans-serif;
            transition:all 0.2s;
        }
        input:focus { outline:none; border-color:var(--accent); background:var(--glass-bg); }
        .btn {
            width:100%; padding:14px;
            background:linear-gradient(135deg, #0d2847, var(--accent));
            border:none;
            border-radius:16px;
            color:#fff;
            font-weight:700;
            font-size:16px;
            cursor:pointer;
            transition:all 0.3s;
            box-shadow:0 4px 20px rgba(13,40,71,0.2);
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(13,40,71,0.3); }
        .flash {
            padding:12px;
            background:rgba(235,87,87,0.05);
            border:1px solid rgba(235,87,87,0.1);
            border-radius:14px;
            color:#eb5757;
            margin-bottom:24px;
            text-align:center;
        }
        .theme-toggle {
            position: absolute; top:20px; left:20px;
            background:var(--glass-bg);
            border:1px solid var(--glass-border);
            border-radius:30px;
            padding:4px 12px;
            color:var(--text-primary);
            cursor:pointer;
            font-size:14px;
            transition:all 0.3s;
        }
        .theme-toggle:hover { background:rgba(255,255,255,0.04); }
        @media (max-width:480px){ .login-card{padding:32px 24px} h1{font-size:24px} }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
    <div class="login-card">
        <div class="logo">
            <i class="bi bi-shield-lock"></i>
            <h1>لوحة التحكم</h1>
            <div class="subtitle">EVILE Admin Panel</div>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label><i class="bi bi-key"></i> كلمة المرور</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">دخول</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                icon.className = 'bi bi-sun-fill';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'bi bi-moon-fill';
                localStorage.setItem('theme', 'dark');
            }
        }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeIcon').className = 'bi bi-sun-fill';
        }
    </script>
</body>
</html>
