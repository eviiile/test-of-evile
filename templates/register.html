<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل القناة - EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 20px 16px 80px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .register-card {
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.05);
            margin-top: 20px;
        }
        .register-card .logo-img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .register-card .description {
            font-size: 14px;
            line-height: 1.8;
            color: #444;
            text-align: justify;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .register-card .description strong {
            color: #0088cc;
        }
        .register-card h1 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .register-card .sub {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 16px; text-align: right; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #333; }
        input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,136,204,0.3);
            border-radius: 14px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #0088cc; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .toast {
            position: fixed; bottom: 80px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            z-index: 1000;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.08);
            height: 44px;
            max-width: 400px;
            margin: 0 auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            text-decoration: none;
            color: #999;
            font-size: 8px;
            font-weight: 500;
            transition: all 0.2s;
            padding: 3px 10px;
            border-radius: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            flex: 1;
            max-width: 70px;
        }
        .nav-item i { font-size: 16px; transition: all 0.2s; }
        .nav-item span { font-size: 7px; }
        .nav-item.active {
            color: #0088cc;
            background: rgba(0, 136, 204, 0.15);
        }
        .nav-item.active i { transform: scale(1.05); }
        .nav-item:active { transform: scale(0.95); }
        .hint {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        @media (min-width: 768px) { .bottom-nav { left: 20px; right: 20px; } }
    </style>
</head>
<body>
    <!-- نفس المحتوى -->

</body>
</html>
