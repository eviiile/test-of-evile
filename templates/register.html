<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة النشر - EVILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 16px 12px 80px;
        }
        .container { max-width: 700px; margin: 0 auto; }

        /* ألوان زجاجية زرقاء */
        .glass {
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.15);
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.05);
        }
        .glass-dark {
            background: rgba(0, 136, 204, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.08);
        }
        .glass-blue {
            background: rgba(0, 136, 204, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.1);
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .dashboard-header h1 {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1a1a1a;
        }
        .dashboard-header h1 i { color: #0088cc; font-size: 20px; }
        .dashboard-header a { font-size: 18px; color: #888; }

        .channel-card {
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .channel-card .channel-id {
            font-size: 13px;
            font-weight: 600;
            color: #0088cc;
        }
        .channel-card .channel-username {
            font-size: 12px;
            color: #555;
        }
        .channel-card .channel-status {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            width: fit-content;
            background: rgba(0,136,204,0.1);
        }
        .channel-card .channel-status.active { color: #28a745; }
        .channel-card .channel-status.paused { color: #ffc107; }
        .channel-card .channel-status.inactive { color: #dc3545; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-card {
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.15);
        }
        .stat-card .number { font-size: 20px; font-weight: 800; }
        .stat-card .label { font-size: 10px; color: #666; margin-top: 2px; }
        .stat-card i { font-size: 18px; display: block; margin-bottom: 4px; color: #0088cc; }

        .icon-center { text-align: center; margin: 12px 0; }
        .icon-center i { font-size: 56px; color: #0088cc; opacity: 0.3; }

        .times-box {
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.15);
        }
        .times-box h3 { font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .times-box .times-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .times-box .time-badge { background: rgba(0,136,204,0.1); padding: 3px 10px; border-radius: 20px; font-size: 11px; }

        .content-selector {
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.15);
        }
        .content-selector h3 { font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .content-selector .selector-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .content-selector select {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid rgba(0,136,204,0.3);
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-size: 12px;
            background: rgba(255,255,255,0.9);
            min-width: 120px;
        }
        .content-selector .btn-select {
            padding: 6px 14px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .content-selector .btn-select:active { transform: scale(0.96); }
        .content-selector .current-content {
            font-size: 11px;
            color: #555;
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(0, 136, 204, 0.05);
            border-radius: 6px;
            border-right: 3px solid #0088cc;
        }
        .content-selector .current-content strong { color: #1a1a1a; }
        .content-selector .content-preview {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            line-height: 1.4;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }
        .actions .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
        }
        .btn-pause { background: #ffc107; color: #333; }
        .btn-stop { background: #dc3545; color: #fff; }
        .btn-publish { background: #28a745; color: #fff; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        .recent-posts {
            border-radius: 12px;
            padding: 12px 14px;
            background: rgba(0, 136, 204, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.15);
        }
        .recent-posts h3 { font-size: 13px; margin-bottom: 8px; }
        .post-item { padding: 6px 0; border-bottom: 1px solid rgba(0,136,204,0.1); font-size: 12px; line-height: 1.4; }
        .post-item .time { font-size: 10px; color: #888; display: block; margin-bottom: 2px; }
        .post-item:last-child { border-bottom: none; }

        .toast {
            position: fixed; bottom: 80px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            display: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 136, 204, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 136, 204, 0.08);
            height: 44px;
            max-width: 400px;
            margin: 0 auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            text-decoration: none;
            color: #999;
            font-size: 8px;
            font-weight: 500;
            transition: all 0.2s;
            padding: 3px 10px;
            border-radius: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            flex: 1;
            max-width: 70px;
        }
        .nav-item i { font-size: 16px; transition: all 0.2s; }
        .nav-item span { font-size: 7px; }
        .nav-item.active {
            color: #0088cc;
            background: rgba(0, 136, 204, 0.15);
        }
        .nav-item.active i { transform: scale(1.05); }
        .nav-item:active { transform: scale(0.95); }

        @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr 1fr 1fr; } .actions { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 768px) { .bottom-nav { left: 20px; right: 20px; } }
    </style>
</head>
<body>
    <!-- نفس المحتوى تماماً كما هو -->
    ...
</body>
</html>
